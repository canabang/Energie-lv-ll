# Package PERSO : Gestion du Lave-Linge (V4.2 - Production)
# Ce fichier est la version personnalisée, avec les vrais noms d'entités de ma production.
# NE PAS PARTAGER TEL QUEL (contient les noms de mes prises connectées).

# 1. HELPERS (Entrées)
# --------------------
input_number:
  # Prix du kWh — ATTENTION : déjà déclaré dans le package lave-vaisselle.
  # Si les deux packages sont actifs, commenter ce bloc ici.
  # cout_du_kwh:
  #   name: "Coût du kWh"
  #   min: 0
  #   max: 10
  #   step: 0.0001
  #   unit_of_measurement: "€/kWh"
  #   icon: mdi:currency-eur
  #   mode: box

  # Seuil de puissance au-dessus duquel on considère que la machine tourne
  seuil_demarrage_lave_linge:
    name: "Seuil Démarrage Lave-Linge"
    min: 1
    max: 100
    step: 1
    unit_of_measurement: "W"
    icon: mdi:flash-outline
    mode: box

input_select:
  # Mémorise l'état du cycle (Éteint / En marche / Terminé)
  etat_lave_linge:
    name: "Lave Linge - État"
    options:
      - Éteint
      - En marche
      - Terminé
    icon: mdi:washing-machine

input_datetime:
  # Horodatage du début et de la fin du cycle
  # ATTENTION : En production, ces entités s'appellent encore debut_machine/fin_machine.
  # On conserve ces noms pour préserver l'historique du recorder.
  debut_machine:
    name: "Lave Linge - Début"
    has_date: true
    has_time: true
  fin_machine:
    name: "Lave Linge - Fin"
    has_date: true
    has_time: true

# 2. UTILITY METER (Compteurs d'Énergie)
# --------------------------------------
utility_meter:
  # Compteur Total — ne se remet jamais à zéro, accumule tout l'historique
  # Nom conservé depuis la production pour garder l'historique du recorder (2.79 kWh)
  compteur_prismal_total:
    source: sensor.prismal_energy
    name: "Compteur Prismal Total"
    unique_id: compteur_prismal_total

  # Compteur de Cycle — remis à zéro au début de chaque cycle par l'automatisation
  # Nom conservé : l'automatisation perso utilise compteur_prismal_cycle (pas compteur_lave_linge_cycle)
  compteur_prismal_cycle:
    source: sensor.prismal_energy
    name: "Compteur Prismal Cycle"
    unique_id: compteur_prismal_cycle

# 3. TEMPLATE SENSORS
# -------------------
template:
  - binary_sensor:
      # Détection de fonctionnement (ON quand la puissance dépasse le seuil)
      - name: "Lave Linge En Marche"
        unique_id: lave_linge_en_marche
        device_class: running
        delay_on:
          minutes: 1
        delay_off:
          minutes: 3
        state: >
          {{ states('sensor.prismal_power')|float(0) > states('input_number.seuil_demarrage_lave_linge')|float(5) }}
        icon: mdi:washing-machine

  - sensor:
      # État Composite (Lavage / Terminé / Éteint)
      - name: "Lave Linge État"
        unique_id: lave_linge_etat
        icon: mdi:state-machine
        state: >
          {% if is_state('binary_sensor.lave_linge_en_marche', 'on') %}
            Lavage
          {% elif is_state('input_select.etat_lave_linge', 'Terminé') %}
            Terminé
          {% else %}
            Éteint
          {% endif %}

      # Durée du cycle (en cours ou terminé)
      # Utilise debut_machine/fin_machine (noms historiques en production)
      - name: "Lave Linge Durée Cycle"
        unique_id: lave_linge_duree_cycle
        icon: mdi:timer
        state: >
          {% set debut = states('input_datetime.debut_lave_linge') %}
          {% set fin = states('input_datetime.fin_lave_linge') %}
          {% set etat = states('sensor.lave_linge_etat') %}

          {% if debut != 'unknown' %}
            {% set debut_ts = as_timestamp(debut) %}
            {% set now_ts = as_timestamp(now()) %}
            
            {% if etat == 'Lavage' %}
              {{ ((now_ts - debut_ts) / 60) | round(0) }} min
            {% elif etat == 'Terminé' and fin != 'unknown' %}
               {% set fin_ts = as_timestamp(fin) %}
               {{ ((fin_ts - debut_ts) / 60) | round(0) }} min
            {% else %}
              0 min
            {% endif %}
          {% else %}
            Inconnu
          {% endif %}
        attributes:
          debut: "{{ states('input_datetime.debut_lave_linge') }}"
          fin: "{{ states('input_datetime.fin_lave_linge') }}"

      # Coût du cycle en cours
      # Utilise compteur_prismal_cycle (nom en production)
      - name: "Lave Linge Coût Cycle"
        unique_id: lave_linge_cout_cycle
        icon: mdi:cash
        unit_of_measurement: "€"
        state: >
          {% set energie = states('sensor.compteur_prismal_cycle') | float(0) %}
          {% set prix = states('input_number.cout_du_kwh') | float(0) %}
          {{ (energie * prix) | round(2) }}
