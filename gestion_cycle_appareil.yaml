blueprint:
  name: 🔄 Gestion Énergie - Cycle Appareil
  description: >
    Ce blueprint gère le cycle complet d'un appareil (Lave-Vaisselle, Lave-Linge...) à partir du package "Énergie Lave-Vaisselle / Lave-Linge".<br><br>
    
    Il base **toute** sa configuration sur le <b>Capteur de Fonctionnement</b> (ex: `binary_sensor.lave_vaisselle_en_marche`).
    Toutes les autres entités associées (`input_select`, `utility_meter`, dates...) sont assignées automatiquement via la racine de ce nom (`lave_vaisselle`).<br><br>
    
    À la fin du cycle, une <b>notification persistante</b> (affichée dans votre HA) ainsi qu'une variable <code>{{ message_fin }}</code> pré-formatée contenant la durée, la consommation et le coût sont générées. Vous pouvez utiliser cette variable directement dans vos propres actions (ex: au sein d'une action `notify`).
  domain: automation
  input:
    # -----------------------------
    # 1. ENTITÉS DÉCLENCHEURS
    # -----------------------------
    appareil_en_marche:
      name: Capteur de fonctionnement (Binary Sensor)
      description: "L'entité qui passe à 'on' en fonctionnement. Exemple : binary_sensor.lave_vaisselle_en_marche. (ATTENTION: Doit se terminer par '_en_marche')"
      selector:
        entity:
          domain: binary_sensor

    prise_connectee:
      name: Prise Connectée (Switch)
      description: "Sert de condition d'arrêt pour la boucle de notification. Si éteinte, la boucle s'arrête."
      selector:
        entity:
          domain: switch

    # -----------------------------
    # 2. OPTIONS ET TEXTE
    # -----------------------------
    activer_notification_ha:
      name: Créer une notification persistante HA ?
      description: "Génère une notification directement dans l'interface Home Assistant à la fin du cycle (avec le titre et le message ci-dessous)."
      default: true
      selector:
        boolean: {}

    delai_boucle:
      name: Délai de rappel (Minutes)
      description: Temps d'attente entre deux notifications de fin dans la boucle.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: min

    titre_notification:
      name: Titre de la notification
      description: Titre qui sera utilisé pour la notification persistante de Home Assistant.
      default: "✅ Cycle Terminé"
      selector:
        text: {}

    message_notification:
      name: Message de fin (Personnalisable)
      description: "Ce texte sera utilisé pour la notification persistante HA. Les variables dynamiques comme `duree_cycle`, `cout_cycle` ou `compteur_cycle` fonctionneront car le blueprint les déduit du nom de votre capteur."
      default: >
        Cycle terminé pour : {{ base_name | replace('_', ' ') | title }}.

        ⏱️ Durée : {{ states(duree_cycle) }}

        ⚡ Conso : {{ states(compteur_cycle) }} kWh

        💶 Coût : {{ states(cout_cycle) }} €
      selector:
        text:
          multiline: true

    # -----------------------------
    # 3. ACTIONS LIBRES POUR L'UTILISATEUR
    # -----------------------------
    action_demarrage:
      name: Séquence au Démarrage
      description: "Actions quand le cycle commence (Optionnel)."
      default: []
      selector:
        action: {}

    action_fin:
      name: Séquence à la Fin (Répétitive)
      description: >
        Actions quand le cycle est TERMINÉ (Répété en boucle tant que la prise est ON).
        💡 ASTUCE : Vous pouvez utiliser la variable template **{{ message_fin }}** dans l'outil 'Message' de vos services de notification (Alexa, Mobile App, etc.) pour récupérer automatiquement la durée, la conso et le prix !
      default: []
      selector:
        action: {}

mode: restart

# Construction de TOUTES les entités à partir de l'input principal
# Ex input: binary_sensor.lave_vaisselle_en_marche
# -> base_name: lave_vaisselle
variables:
  appareil_var: !input appareil_en_marche
  base_name: "{{ appareil_var.split('.')[1] | replace('_en_marche', '') }}"
  
  # Construction des strings d'Entités (c'est le package qui les a créés)
  etat_appareil: "input_select.etat_{{ base_name }}"
  compteur_cycle: "sensor.compteur_{{ base_name }}_cycle"
  heure_debut: "input_datetime.debut_{{ base_name }}"
  heure_fin: "input_datetime.fin_{{ base_name }}"
  duree_cycle: "sensor.{{ base_name }}_duree_cycle"
  cout_cycle: "sensor.{{ base_name }}_cout_cycle"
  titre_var: !input titre_notification
  activer_notif: !input activer_notification_ha

  # Le message pré-construit ou modifié par l'utilisateur !
  message_fin: !input message_notification

# Déclencheurs
trigger:
  - platform: state
    entity_id: !input appareil_en_marche
    from: "off"
    to: "on"
    id: demarrage
  - platform: state
    entity_id: !input appareil_en_marche
    from: "on"
    to: "off"
    id: fin
  - platform: homeassistant
    event: start
    id: redemarrage

action:
  - choose:
      # CAS A : DÉMARRAGE
      - conditions:
          - condition: trigger
            id: demarrage
        sequence:
          # 1. Reset Compteur
          - service: utility_meter.reset
            target:
              entity_id: "{{ compteur_cycle }}"
          # 2. Etat = En marche
          - service: input_select.select_option
            target:
              entity_id: "{{ etat_appareil }}"
            data:
              option: En marche
          # 3. Enregistrement Heure Début
          - service: input_datetime.set_datetime
            target:
              entity_id: "{{ heure_debut }}"
            data:
              datetime: "{{ now() }}"
          # 4. Action perso Utilisateur
          - choose:
              - conditions: "{{ true }}"
                sequence: !input action_demarrage

      # CAS B : FIN DU CYCLE
      - conditions:
          - condition: trigger
            id: fin
        sequence:
          # 1. Etat = Terminé
          - service: input_select.select_option
            target:
              entity_id: "{{ etat_appareil }}"
            data:
              option: Terminé
          # 2. Enregistrement Heure Fin
          - service: input_datetime.set_datetime
            target:
              entity_id: "{{ heure_fin }}"
            data:
              datetime: "{{ now() }}"

      # CAS C : REDÉMARRAGE HA
      - conditions:
          - condition: trigger
            id: redemarrage
        sequence:
          - wait_template: |-
              {{ has_value(etat_appareil) and 
                 has_value('!input prise_connectee') }}
            timeout: "00:05:00"
            continue_on_timeout: false

  # ---------------------------------------------------------
  # MOTEUR DE BOUCLE (FIN)
  # ---------------------------------------------------------
  - if:
      - condition: template
        value_template: "{{ is_state(etat_appareil, 'Terminé') }}"
      - condition: state
        entity_id: !input prise_connectee
        state: "on"
    then:
      - repeat:
          sequence:
            # 1. Notification persistante HA en dur (incluse par défaut pour garder trace)
            - if:
                - condition: template
                  value_template: "{{ activer_notif }}"
              then:
                - service: persistent_notification.create
                  data:
                    message: "{{ message_fin }}"
                    title: "{{ titre_var }}"
                    notification_id: "{{ base_name }}_fin"

            # 2. Actions perso Utilisateur, capable d'utiliser {{ message_fin }} !
            - choose:
                - conditions: "{{ true }}"
                  sequence: !input action_fin

            # 3. Délai de la boucle
            - delay:
                minutes: !input delai_boucle
          while:
            - condition: state
              entity_id: !input prise_connectee
              state: "on"
