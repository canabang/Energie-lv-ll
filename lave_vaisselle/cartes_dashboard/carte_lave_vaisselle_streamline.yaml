# ==========================================
# 🧺 WIDGET STREAMLINE LAVE-VAISSELLE (V4.2)
# ==========================================
# Carte compacte animée avec effet "Aura" lors du fonctionnement.
# Idéal pour un affichage sur tableau de bord d'accueil mobile.
# Nécessite: mushroom-cards, card-mod

type: custom:mod-card
card_mod:
  style: |
    ha-card {
      background: transparent !important;
      backdrop-filter: none !important;
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3) !important;
      border-radius: 20px !important;
      transition: all 0.3s ease !important;
      overflow: hidden;
      padding: 0px 10px !important; /* Ajoute un peu de marge sur les bords */
    }
    ha-card:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3) !important;
    }
card:
  type: horizontal-stack
  cards:
    # --- COLONNE DE GAUCHE : LAVE VAISSELLE ET STATUT ---
    - type: custom:mushroom-template-card
      primary: Lave Vaisselle
      secondary: >-
        {% set etat_prise = states('switch.A_CHANGER_PRISE') %}
        {% set prog = states('sensor.dishwasher_program') %}
        {% set progress = states('sensor.dishwasher_progress') %}
        
        {% if etat_prise == 'on' %}
          Allumé
          {%- if prog not in ['unknown', 'unavailable', 'off'] %} • {{ prog }}{% endif -%}
          {%- if progress not in ['unknown', 'unavailable', '0.0', '0'] %} • {{ progress }}{% endif -%}
        {% else %}
          Éteint
        {% endif %}
      icon: mdi:dishwasher
      entity: switch.A_CHANGER_PRISE
      icon_color: >-
        {{ '#2E8B57' if is_state('switch.A_CHANGER_PRISE', 'on') else 'grey' }}
      tap_action:
        action: toggle
      card_mod:
        style: |
          ha-card {
            border: none !important;
            box-shadow: none !important;
            background: none !important;
            --ha-card-border-width: 0px !important;
          }
          {% if states('sensor.A_CHANGER_PUISSANCE') | float(0) > 5 %}
          mushroom-shape-icon {
            position: relative !important;
            display: flex;
          }
          mushroom-shape-icon::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 40%, rgba(46, 139, 87, 0.9) 100%);
            animation: spin-aura 1.5s linear infinite;
            z-index: 0;
          }
          mushroom-shape-icon::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: var(--card-background-color, #1c1c1c);
            z-index: 1;
          }
          ha-state-icon {
            z-index: 2;
          }
          @keyframes spin-aura {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
          {% endif %}

    # --- COLONNE DE DROITE : LES INFOS DE CONSOMMATION ---
    # Récapitulatif instantané de la consommation, du coût et de l'énergie du cycle
    - type: custom:mushroom-chips-card
      alignment: end
      chips:
        - type: template
          entity: sensor.A_CHANGER_PUISSANCE
          content: >-
            {{ states('sensor.A_CHANGER_PUISSANCE') }} W | {{ states('sensor.lave_vaisselle_cout_cycle') }} € | {{ states('sensor.compteur_lave_vaisselle_cycle') | float(0) | round(1) }} kWh
          icon: mdi:flash
          icon_color: >-
            {{ 'orange' if is_state('switch.A_CHANGER_PRISE', 'on') else 'grey' }}
          tap_action:
            action: more-info
      card_mod:
        style: |
          ha-card {
            border: none !important;
            box-shadow: none !important;
            background: none !important;
            /* Centre verticalement la puce par rapport à la carte de gauche */
            display: flex !important;
            height: 100% !important;
            align-items: center !important;
            justify-content: flex-end !important;
            --chip-background: transparent;
            --chip-border-width: 0px;
            margin-right: 5px;
            /* Optionnel : On réduit un peu la taille de police pour que tout rentre */
            font-size: 0.9em !important;
          }
