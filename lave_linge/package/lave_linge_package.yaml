# Package : Gestion du Lave-Linge (V4.2)
# Ce fichier regroupe toute la configuration (Helpers, Sensors, Automation) pour le lave-linge.
# Pour l'activer, assurez-vous d'avoir ajouté ce dossier à votre configuration "packages".
# Dans configuration.yaml ajouter :

# homeassistant:
#   packages: !include_dir_named packages

###########################################################


# 1. HELPERS (Entrées)
# --------------------
input_number:
  # [HELPER] Coût du kWh
  # Utilisé pour calculer le coût de chaque cycle.
  # Valeur par défaut : 0. À configurer selon votre abonnement (ex: 0.2516).
  cout_du_kwh:
    name: "Coût du kWh"
    min: 0
    max: 10
    step: 0.0001
    unit_of_measurement: "€/kWh"
    icon: mdi:currency-eur
    mode: box

  # [HELPER] Seuil de Démarrage (W)
  # Permet d'ajuster le seuil de démarrage depuis l'UI sans modifier de YAML
  seuil_demarrage_lave_linge:
    name: "Seuil Démarrage Lave-Linge"
    min: 1
    max: 100
    step: 1
    unit_of_measurement: "W"
    icon: mdi:flash-outline
    mode: box

input_select:
  # [HELPER] État de la Machine
  # Stocke l'état actuel (Éteint / En marche / Terminé).
  # Essentiel pour gérer les redémarrages de Home Assistant sans perdre le fil du cycle.
  etat_lave_linge:
    name: "Lave Linge - État"
    options:
      - Éteint
      - En marche
      - Terminé
    icon: mdi:washing-machine

input_datetime:
  # [HELPER] Horodatage
  # Deux entités pour stocker l'heure de début et de fin.
  # Permet de calculer la durée précise du cycle, même après un redémarrage.
  debut_machine:
    name: "Lave Linge - Début"
    has_date: true
    has_time: true
  fin_machine:
    name: "Lave Linge - Fin"
    has_date: true
    has_time: true

# 2. UTILITY METER (Compteur Cycle)
# ---------------------------------
# Note: Si vous l'avez déjà créé via l'UI, vous pouvez commenter ce bloc.
utility_meter:
  # [HELPER] Compteur de Cycle
  # Isole la consommation du cycle courant.
  # Il est remis à zéro automatiquement au début de chaque nouveau cycle (via l'automatisation).
  compteur_lave_linge_cycle:
    # [A_CHANGER] Remplacez 'sensor.prismal_energy' par votre capteur de consommation totale (kWh)
    source: sensor.prismal_energy
    name: "Compteur Lave Linge Cycle"
    # cycle: never # Pas de cycle automatique (reset manuel via automation)

# 3. TEMPLATE SENSORS
# -------------------
template:
  - binary_sensor:
      # [SENSOR] Détection de fonctionnement
      # Ce capteur passe à ON quand la puissance dépasse le seuil défini (machine en cours de lavage).
      - name: "Lave Linge En Marche"
        unique_id: lave_linge_en_marche
        device_class: running
        delay_on:
          minutes: 1
        delay_off:
          minutes: 3
        # [A_CHANGER] Remplacez 'sensor.prismal_power' par votre capteur de puissance (W)
        # Ajustez le seuil dynamiquement via le helper (ici fallback 5W si indisponible)
        state: >
          {{ states('sensor.prismal_power')|float(0) > states('input_number.seuil_demarrage_lave_linge')|float(5) }}
        icon: mdi:washing-machine

  - sensor:
      # [SENSOR] État Composite
      # Combine la détection de puissance (Lavage) et la mémorisation de fin de cycle (Terminé) via l'input_select.
      - name: "Lave Linge État"
        unique_id: lave_linge_etat
        icon: mdi:state-machine
        state: >
          {% if is_state('binary_sensor.lave_linge_en_marche', 'on') %}
            Lavage
          {% elif is_state('input_select.etat_lave_linge', 'Terminé') %}
            Terminé
          {% else %}
            Éteint
          {% endif %}

      # [SENSOR] Calcul de la Durée
      # Affiche le temps écoulé depuis le début (si en cours) ou la durée totale du dernier cycle (si terminé).
      - name: "Lave Linge Durée Cycle"
        unique_id: lave_linge_duree_cycle
        icon: mdi:timer
        state: >
          {% set debut = states('input_datetime.debut_machine') %}
          {% set fin = states('input_datetime.fin_machine') %}
          {% set etat = states('sensor.lave_linge_etat') %}
          
          {% if debut != 'unknown' %}
            {% set debut_ts = as_timestamp(debut) %}
            {% set now_ts = as_timestamp(now()) %}
            
            {% if etat == 'Lavage' %}
              {{ ((now_ts - debut_ts) / 60) | round(0) }} min
            {% elif etat == 'Terminé' and fin != 'unknown' %}
               {% set fin_ts = as_timestamp(fin) %}
               {{ ((fin_ts - debut_ts) / 60) | round(0) }} min
            {% else %}
              0 min
            {% endif %}
          {% else %}
            Inconnu
          {% endif %}
        attributes:
          debut: "{{ states('input_datetime.debut_machine') }}"
          fin: "{{ states('input_datetime.fin_machine') }}"

      # [SENSOR] Estimation du Coût
      # Multiplie la consommation du cycle actuel (kWh) par le prix unitaire (€/kWh).
      - name: "Lave Linge Coût Cycle"
        unique_id: lave_linge_cout_cycle
        icon: mdi:cash
        unit_of_measurement: "€"
        # [A_CHANGER] Remplacez 'input_number.cout_du_kwh' par votre entité de coût unitaire
        state: >
          {% set energie = states('sensor.compteur_lave_linge_cycle') | float(0) %}
          {% set prix = states('input_number.cout_du_kwh') | float(0) %}
          {{ (energie * prix) | round(2) }}

