# Carte de Suivi Entités Lave-Linge (V4.2)
# Vous pouvez coller ce bloc dans une carte "Manuel" (YAML) sur votre dashboard.
# 
# Nécessite les cartes personnalisées (HACS) :
# - mushroom-cards

type: vertical-stack
cards:
  # ── EN-TÊTE ──
  # Titre de la section indiquant quel appareil est surveillé
  - type: custom:mushroom-title-card
    title: 🧺 Lave-Linge
    subtitle: Suivi des entités du package

  # ── ÉTAT PRINCIPAL ──
  # Carte dynamique résumant l'état et la durée du cycle en cours ou terminé
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.lave_linge_etat') }}"
    secondary: >-
      {% if is_state('sensor.lave_linge_etat', 'Lavage') %}
        En cours depuis {{ states('sensor.lave_linge_duree_cycle') }}
      {% elif is_state('sensor.lave_linge_etat', 'Terminé') %}
        Durée : {{ states('sensor.lave_linge_duree_cycle') }}
      {% else %}
        En attente
      {% endif %}
    icon: mdi:washing-machine
    entity: sensor.lave_linge_etat
    icon_color: >-
      {% if is_state('sensor.lave_linge_etat', 'Lavage') %}
        blue
      {% elif is_state('sensor.lave_linge_etat', 'Terminé') %}
        green
      {% else %}
        grey
      {% endif %}

  # ── SENSORS TEMPLATE ──
  # Capteurs générés par Home Assistant basés sur la prise connectée et les helpers
  - type: custom:mushroom-entity-card
    entity: binary_sensor.lave_linge_en_marche
    name: En Marche (binary)
    icon_color: blue

  - type: custom:mushroom-entity-card
    entity: sensor.lave_linge_etat
    name: État Composite
    icon_color: teal

  - type: custom:mushroom-entity-card
    entity: sensor.lave_linge_duree_cycle
    name: Durée Cycle
    icon_color: orange

  - type: custom:mushroom-entity-card
    entity: sensor.lave_linge_cout_cycle
    name: Coût Cycle
    icon_color: amber

  # ── UTILITY METER ──
  # Le compteur global qui ne se remet jamais à zéro et accumule la consommation totale
  - type: custom:mushroom-entity-card
    entity: sensor.compteur_lave_linge_total
    name: Compteur Total (kWh)
    icon_color: deep-purple

  # Le compteur officiel qui accumule les kWh pendant le cycle et se reset au début du suivant
  - type: custom:mushroom-entity-card
    entity: sensor.compteur_lave_linge_cycle
    name: Compteur Cycle (kWh)
    icon_color: purple

  # ── HELPERS ──
  # Ces entités stockent des valeurs gérées par l'utilisateur ou par le Blueprint
  - type: custom:mushroom-entity-card
    entity: input_select.etat_lave_linge
    name: Helper État
    icon_color: cyan

  - type: custom:mushroom-entity-card
    entity: input_datetime.debut_lave_linge
    name: Helper Début
    icon_color: grey

  - type: custom:mushroom-entity-card
    entity: input_datetime.fin_lave_linge
    name: Helper Fin
    icon_color: grey

  - type: custom:mushroom-entity-card
    entity: input_number.cout_du_kwh
    name: Coût du kWh
    icon_color: amber

  - type: custom:mushroom-entity-card
    entity: input_number.seuil_demarrage_lave_linge
    name: Seuil de Démarrage
    icon_color: flash-outline
