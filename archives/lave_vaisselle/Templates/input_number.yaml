# [HELPER] Coût du kWh
# Utilisé pour calculer le coût de chaque cycle.
# À configurer selon votre abonnement (ex: 0.2516).
cout_du_kwh:
  name: "Coût du kWh"
  min: 0
  max: 10
  step: 0.0001
  unit_of_measurement: "€/kWh"
  icon: mdi:currency-eur
  mode: box

# [HELPER] Seuil de Démarrage (W)
# Permet d'ajuster le seuil de démarrage depuis l'UI sans modifier de YAML
seuil_demarrage_lave_vaisselle:
  name: "Seuil Démarrage Lave-Vaisselle"
  min: 1
  max: 100
  step: 1
  unit_of_measurement: "W"
  icon: mdi:flash-outline
  mode: box
